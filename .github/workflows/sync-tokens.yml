name: Sync tokens and publish

on:
  push:
    branches: [main]
    paths:
      - 'src/tokens/tokens.json'
  workflow_dispatch:

concurrency:
  group: token-publish
  cancel-in-progress: false

jobs:
  rebuild-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Regenerate CSS tokens
        run: npm run build:tokens

      - name: Validate tokens
        run: npm run validate:tokens

      - name: Commit regenerated CSS if changed
        run: |
          if ! git diff --quiet dist/variables.css; then
            git add dist/variables.css
            git commit -m "chore: regenerate tokens CSS from tokens.json [skip ci]"
            git push
          fi

      - name: Bump version and tag
        run: |
          git checkout -- package-lock.json
          npm version patch -m "chore: release %s [skip ci]"
          git push --follow-tags

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Show version to pin
        run: |
          V=$(node -p "require('./package.json').version")
          echo "## Published @easysimplecool/design-system@$V" >> $GITHUB_STEP_SUMMARY
          echo "Install CSS: \`import \"@easysimplecool/design-system/variables.css\"\`" >> $GITHUB_STEP_SUMMARY
