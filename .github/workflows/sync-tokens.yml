name: Sync tokens and publish

on:
  push:
    branches:
      - main
      - token-studio
    paths:
      - 'src/tokens/tokens.json'
  workflow_dispatch:

jobs:
  rebuild-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Configure git for commits
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Regenerate colors.ts and variables.css from tokens.json
        run: npm run build:tokens

      - name: Check if generated token files changed
        id: diff
        run: |
          if git diff --quiet src/tokens/colors.ts src/tokens/variables.css src/tokens/typography.css; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit regenerated token files
        if: steps.diff.outputs.changed == 'true'
        run: |
          git add src/tokens/colors.ts src/tokens/variables.css src/tokens/typography.css
          git commit -m "chore: regenerate tokens from tokens.json [skip ci]"
          git push

      - name: Bump patch version
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        run: |
          git checkout -- package-lock.json
          npm version patch -m "chore: release %s [skip ci]"

      - name: Push version bump and tag
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        run: git push --follow-tags

      - name: Build package
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        run: npm run build

      - name: Publish to npm
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        run: |
          npm publish --access public \
            --registry=https://registry.npmjs.org \
            --@easysimplecool:registry=https://registry.npmjs.org
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
